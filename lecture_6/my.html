<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Slider</title>
    <link rel="stylesheet" href="my.css">
</head>
<body>

    <div class="card-wrapper">
        <div class="slider-container">
            <div class="card-stack">
                <div class="card card-back-3"><img src="https://wallpapercave.com/wp/wp9799892.jpg"></div>
                <div class="card card-back-2"><img src="https://wallpapercave.com/wp/wp2551908.jpg"></div>
                
                <div class="card card-active">
                    <img src="https://wallpapercave.com/wp/wp8971916.jpg">
                </div>
                
                <div class="card card-front-2"><img src="https://wallpapercave.com/wp/wp2894593.jpg"></div>
                <div class="card card-front-3"><img src="https://wallpapercave.com/wp/wp8971916.jpg"></div>
            </div>
        </div>

        <div class="info-container">
            <div class="nav-buttons">
                <button class="nav-btn up-btn">▲</button>
                <button class="nav-btn down-btn">▼</button>
            </div>

            <div class="profile-details">
                <h1 class="profile-name">Luffy kun</h1>
                <p class="profile-title">MARKETING MANAGER</p>
            </div>

            <div class="pagination">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot class-active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </div>

</body>
</html>
