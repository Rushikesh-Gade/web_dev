<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="nw.css">
</head>
<body>

    <header class="top-navbar">
        <div class="nav-left">
            <i class="fas fa-bars" style="font-size: 20px; cursor: pointer;"></i>
            <span style="font-weight: 700; font-size: 18px; margin-right: 15px;">Canva</span>
            <button class="nav-btn transparent">Home</button>
            <button class="nav-btn transparent">File</button>
            <button class="nav-btn transparent">Resize</button>
            <button class="nav-btn transparent"><i class="fas fa-undo"></i></button>
            <button class="nav-btn transparent"><i class="fas fa-redo"></i></button>
            <button class="nav-btn transparent"><i class="fas fa-cloud-check"></i></button>
        </div>
        <div class="nav-center">
            <span style="font-size: 14px;">Sample</span>
        </div>
        <div class="nav-right">
            <button class="nav-btn btn-trial"><i class="fas fa-crown"></i> Start your trial for ₹0</button>
            <div style="width: 28px; height: 28px; background: #444; border-radius: 50%; color: white; display:flex; justify-content:center; align-items:center; font-size: 12px;">S</div>
            <button class="nav-btn transparent"><i class="fas fa-chart-bar"></i></button>
            <button class="nav-btn btn-share">Share</button>
        </div>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <a href="#" class="sidebar-item active"><i class="fas fa-th-large"></i>Templates</a>
            <a href="#" class="sidebar-item"><i class="fas fa-shapes"></i>Elements</a>
            <a href="#" class="sidebar-item"><i class="fas fa-font"></i>Text</a>
            <a href="#" class="sidebar-item">
                <i class="fas fa-crown crown-badge"></i>
                <i class="fas fa-award"></i>Brand
            </a>
            <a href="#" class="sidebar-item"><i class="fas fa-cloud-upload-alt"></i>Uploads</a>
            <a href="#" class="sidebar-item"><i class="fas fa-pen"></i>Draw</a>
            <a href="#" class="sidebar-item"><i class="fas fa-folder"></i>Projects</a>
            <a href="#" class="sidebar-item"><i class="fas fa-grip-horizontal"></i>Apps</a>
            <a href="#" class="sidebar-item"><i class="fas fa-magic"></i>Magic Media</a>
            <a href="#" class="sidebar-item"><i class="fas fa-music"></i>Audio</a>
            <a href="#" class="sidebar-item"><i class="fas fa-video"></i>Video</a>
        </aside>

        <aside class="left-panel">
            <div class="search-box">
                <i class="fas fa-plus" style="color: #666;"></i>
                <input type="text" placeholder="Describe your ideal design">
                <i class="fas fa-microphone" style="color: #666;"></i>
            </div>
            
            <div class="action-buttons">
                <button class="btn-generate"><i class="fas fa-magic" style="color: var(--canva-purple);"></i> Generate</button>
                <button class="btn-search">Search</button>
            </div>

            <div class="section-title">Recently used <span>See all</span></div>
            <div class="grid-2">
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/recent1/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/recent2/150/75');"></div>
            </div>

            <div class="section-title">All results</div>
            <div class="grid-2">
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port1/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port2/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port3/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port4/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port5/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port6/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port7/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port8/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port9/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port10/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port11/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port12/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port13/150/75');"></div>
                <div class="template-card" style="background-image: url('https://picsum.photos/seed/port14/150/75');"></div>
            </div>
        </aside>

        <main class="workspace">
            
            <div class="canvas-toolbar">
                <button class="toolbar-btn"><span class="color-dot"></span></button>
                <button class="toolbar-btn"><i class="fas fa-grip-lines"></i></button>
                <button class="toolbar-btn"><i class="fas fa-border-style"></i></button>
                <div style="width: 1px; height: 20px; background: #ddd; margin: 0 5px;"></div>
                <button class="toolbar-btn">Effects</button>
                <button class="toolbar-btn">Animate</button>
                <button class="toolbar-btn">Position</button>
                <button class="toolbar-btn"><i class="fas fa-paint-roller"></i></button>
            </div>

            <div class="canvas-area">
                <div class="canvas">
                    <div class="shape-container"><div class="shape circle"></div></div>
                    <div class="shape-container"><div class="shape square"></div></div>
                    <div class="shape-container"><div class="shape triangle"></div></div>
                    <div class="shape-container"><div class="shape pentagon"></div></div>

                    <div class="shape-container"><div class="shape plus"></div></div>
                    <div class="shape-container"><div class="shape parallelogram"></div></div>
                    <div class="shape-container"><div class="shape arrow"></div></div>
                    
                    <div class="shape-container selected">
                        <div class="floating-menu">
                            <i class="far fa-copy"></i>
                            <i class="fas fa-lock-open"></i>
                            <i class="far fa-clone"></i>
                            <i class="far fa-trash-alt"></i>
                            <i class="fas fa-ellipsis-h"></i>
                        </div>

                        <svg class="heart-svg" viewBox="2 3 20 18.35" preserveAspectRatio="none">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
                        </svg>

                        <div class="handle nw"></div>
                        <div class="handle n"></div>
                        <div class="handle ne"></div>
                        <div class="handle w"></div>
                        <div class="handle e"></div>
                        <div class="handle sw"></div>
                        <div class="handle s"></div>
                        <div class="handle se"></div>
                        <div class="rotate-handle"><i class="fas fa-sync-alt"></i></div>
                    </div>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="bottom-tools">
                    <i class="far fa-sticky-note"></i> Notes
                    <i class="fas fa-stopwatch" style="margin-left: 10px;"></i> Timer
                </div>
                
                <div class="bottom-tools zoom-slider">
                    <div style="display:flex; gap: 3px; border: 1px solid #ccc; padding: 2px 6px; border-radius: 4px;">
                        <i class="fas fa-square" style="color: #ffda47; font-size:10px;"></i>
                        <i class="fas fa-play" style="color: #ff832b; font-size:10px; transform: rotate(-90deg);"></i>
                        <i class="fas fa-heart" style="color: #ff3344; font-size:10px;"></i>
                    </div>
                    <i class="fas fa-minus"></i>
                    <input type="range" min="10" max="200" value="53">
                    <span style="font-weight: 600;">53%</span>
                </div>

                <div class="bottom-tools">
                    <i class="fas fa-th"></i>
                    <span>Pages 1/1</span>
                    <i class="fas fa-expand"></i>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
