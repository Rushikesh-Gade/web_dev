<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="new.css">
</head>
<body class="bg-light">

<div class="app d-flex flex-column vh-100 overflow-hidden">
    
    <header class="top d-flex justify-content-between align-items-center px-3 text-white flex-shrink-0">
        <div class="d-flex gap-3 align-items-center">
            <span>☰</span> <span>File</span> <span>Resize</span> <span>✏️ Editing</span> <span>↩️</span> <span>↪️</span> <span>☁️</span>
        </div>
        <div class="d-flex gap-3 align-items-center">
            <span>Sample</span>
            <button class="btn btn-sm text-white trial-btn">👑 Start trial for ₹0</button>
        </div>
        <div class="d-flex gap-3 align-items-center">
            <span>👤</span> <span>📊</span> <span>👑</span> <span>Present</span>
            <button class="btn btn-light btn-sm text-primary fw-bold px-3">Share</button>
        </div>
    </header>

    <div class="d-flex flex-grow-1 overflow-hidden">
        
        <nav class="menu bg-white border-end d-flex flex-column align-items-center pt-3 gap-4 z-2">
            <div class="icon active"><div class="box">📑</div>Templates</div>
            <div class="icon"><div class="box">💠</div>Elements</div>
            <div class="icon"><div class="box">Ⓣ</div>Text</div>
            <div class="icon"><div class="box">👑</div>Brand</div>
            <div class="icon"><div class="box">☁️</div>Uploads</div>
            <div class="icon"><div class="box">✏️</div>Draw</div>
            <div class="icon"><div class="box">📁</div>Projects</div>
            <div class="icon"><div class="box">⬛</div>Apps</div>
        </nav>

        <aside class="panel bg-white border-end d-flex flex-column overflow-auto">
            <div class="p-3 border-bottom">
                <div class="input-group mb-2">
                    <span class="input-group-text bg-white border-end-0">✨</span>
                    <input type="text" class="form-control border-start-0 border-end-0 shadow-none px-0" placeholder="Describe ideal design">
                    <span class="input-group-text bg-white border-start-0">🎤</span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary w-50 fw-bold">✨ Generate</button>
                    <button class="btn btn-search w-50 fw-bold text-white">Search</button>
                </div>
            </div>

            <div class="d-flex justify-content-between px-3 mt-3 mb-2 small fw-bold">
                <span class="text-dark">Recently used</span> <span class="text-secondary fw-normal">See all</span>
            </div>
            <div class="d-flex gap-2 px-3">
                <div class="recent border rounded"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Recent 1"></div>
                <div class="recent border rounded"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Recent 2"></div>
                <div class="recent border rounded"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Recent 3"></div>
            </div>

            <div class="px-3 mt-4 mb-2 small fw-bold text-dark">All results</div>
            
            <div class="row g-2 px-3 pb-3 m-0">
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
                <div class="col-6"><div class="tpl-card"><img src="https://live.staticflickr.com/7474/27546526401_511fba07eb.jpg" alt="Template"></div></div>
            </div>
        </aside>

        <main class="flex-grow-1 d-flex flex-column position-relative">
            
            <div class="float-bar position-absolute top-0 start-50 translate-middle-x mt-3 bg-white shadow-sm rounded-pill px-3 py-2 d-flex align-items-center gap-3 z-3 small fw-bold">
                <span>Edit</span>
                <div class="dot bg-danger"></div>
                <div class="vr"></div>
                <span class="fs-5">≡</span> <span class="fs-5">☷</span>
                <div class="vr"></div>
                <span>Effects</span> <span>Animate</span> <span>Position</span>
                <div class="vr"></div>
                <span class="fs-5">🖌️</span>
            </div>

            <div class="flex-grow-1 d-flex align-items-center justify-content-center overflow-auto p-4">
                <div class="board bg-white shadow rounded p-5 d-grid gap-4 justify-content-center align-content-center">
                    
                    <div class="shape circle bg-lime rounded-circle"></div>
                    <div class="shape square bg-yellow"></div>
                    <div class="shape tri bg-orange"></div>
                    <div class="shape penta bg-blue"></div>

                    <div class="shape cross bg-black"></div>
                    <div class="shape para bg-purple"></div>
                    <div class="shape arrow bg-violet"></div>
                    
                    <!-- <div class="select-box border border-primary d-flex align-items-center justify-content-center position-relative"> -->
                        <!-- <div class="tool-pop position-absolute bg-white border shadow-sm rounded px-2 py-1 d-flex gap-2"> -->
                            <!-- <span>↻</span> <span>🔓</span> <span>❐</span> <span class="text-danger">🗑️</span> <span>•••</span> -->
                        <!-- </div> -->
                        
                        <svg class="heart" viewBox="0 0 100 100">
                            <path d="M 50 90 C 10 60, -10 20, 25 5 C 40 -2, 50 15, 50 15 C 50 15, 60 -2, 75 5 C 110 20, 90 60, 50 90 Z" />
                        </svg>

                        <!-- <div class="hnd h-tl"></div> <div class="hnd h-tr"></div>
                        <div class="hnd h-bl"></div> <div class="hnd h-br"></div>
                        <div class="pill p-t"></div> <div class="pill p-b"></div>
                        <div class="pill p-l"></div> <div class="pill p-r"></div> -->
                        
                        <div class="rotate position-absolute bg-white border rounded-circle shadow-sm d-flex align-items-center justify-content-center">↻</div>
                    </div>
                </div>
            </div>

            <footer class="bg-white border-top d-flex justify-content-between align-items-center px-3 py-2 small text-secondary">
                <div class="d-flex gap-3"> <span>📝 Notes</span> <span>⏱️ Timer</span> </div>
                <div class="preview bg-light border rounded px-2 py-1 d-flex gap-2">
                    <span class="page bg-primary rounded-1"></span> <span class="page bg-primary rounded-1"></span> <span class="page bg-primary rounded-1"></span> <span class="page border border-secondary rounded-1 d-flex align-items-center justify-content-center text-dark">+</span>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <input type="range" class="form-range" style="width: 80px;" min="1" max="100" value="53">
                    <span>53%</span> <span>⊞ Pages</span> <span>1 / 1</span> <span class="fs-5">⤢</span>
                </div>
            </footer>
            
        </main>
    </div>
</div>

</body>
</html>
