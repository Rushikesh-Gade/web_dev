<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To_do App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .task { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ccc; }
        button { cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

    <h2>My To-Do List</h2>
    <input type="text" id="taskInput" placeholder="Enter a new task...">
    <button onclick="createTask()">Add Task</button>

    <div id="taskList"></div>

    <script>
     
        let tasks = JSON.parse(window.localStorage.getItem("tasks")) || [];

        
        const taskListContainer = document.getElementById("taskList");
        const taskInput = document.getElementById("taskInput");

       
        function renderTasks() {
            taskListContainer.innerHTML = ""; 
            
            tasks.forEach((task, index) => {
                const taskDiv = document.createElement("div");
                taskDiv.className = "task";
                
                const taskText = document.createElement("span");
                taskText.textContent = task;

                const actionDiv = document.createElement("div");

                const editBtn = document.createElement("button");
                editBtn.textContent = "Edit";
                editBtn.onclick = () => updateTask(index);

                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "Delete";
                deleteBtn.onclick = () => deleteTask(index);

                actionDiv.appendChild(editBtn);
                actionDiv.appendChild(deleteBtn);

                taskDiv.appendChild(taskText);
                taskDiv.appendChild(actionDiv);
                
                taskListContainer.appendChild(taskDiv);
            });
        }
        

    
        function createTask() {
            const newTask = taskInput.value.trim();
            if (newTask) {
                tasks.push(newTask);
                taskInput.value = "";
                saveAndRender();
            } else {
                window.alert("Please enter a task!"); // BOM Alert
            }
        }

       
        function updateTask(index) {
            
            const updatedTask = window.prompt("Edit task:", tasks[index]); 
            if (updatedTask !== null && updatedTask.trim() !== "") {
                tasks[index] = updatedTask.trim();
                saveAndRender();
            }
        }

      
        function deleteTask(index) {
            
            if(window.confirm("Are you sure you want to delete this task?")) {
                tasks.splice(index, 1);
                saveAndRender();
            }
        }

       
        function saveAndRender() {
            window.localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
        }

        
        renderTasks();
    </script>
</body>
</html>
