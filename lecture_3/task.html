<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="task.css">

</head>
<body>

    <div class="card">
        <div class="card-image-container">
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80" alt="Mountain Landscape" class="card-image">
        </div>

        <div class="card-content">
            <span class="card-date">4 days ago</span>
            <h2 class="card-title">Post One</h2>
            <p class="card-text">
                Lorem ipsum dolor sit amet consectetur. Ducimus, repudiandae temporibus omnis illum maxime quod deserunt eligendi dolor.
            </p>
        </div>

        <div class="card-footer">
            <div class="stat-item has-divider">
                <span class="stat-value">4<sup>m</sup></span>
                <span class="stat-label">READ</span>
            </div>
            <div class="stat-item has-divider">
                <span class="stat-value">5123</span>
                <span class="stat-label">VIEWS</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">32</span>
                <span class="stat-label">COMMENTS</span>
            </div>
        </div>
    </div>

</body>
</html>
