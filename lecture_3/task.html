<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="task.css"> 
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Georgia&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head> -->
<body>

    <div class="card">
        <div class="card-image-container">
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80" alt="Mountain Landscape" class="card-image">
        </div>

        <div class="card-content">
            <span class="card-date">4 days ago</span>
            <h2 class="card-title">Post One</h2>
            <p class="card-text">
                Lorem ipsum dolor sit amet consectetur, adipisicing elit. 
                Commodi optio repudiandae qui perferendis rerum aliquid itaque cumque expedita,
                repellat mollitia, incidunt accusantium, culpa blanditiis ab amet. 
                Iste, nesciunt ex! Dolore.
            </p>
            <p></p>
        </div>

        <div class="card-footer">
            <div class="stat-item">
                <span class="no">4<sup>m</sup></span>
                <span class="name">READ</span>
            </div>
            <div class="stat-item">
                <span class="no">5123</span>
                <span class="name">VIEWS</span>
            </div>
            <div class="stat-item">
                <span class="no">32</span>
                <span class="name">COMMENTS</span>
            </div>
        </div>
    </div>

</body>
</html>
