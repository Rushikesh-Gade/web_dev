<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML task</title>
</head>
<body>
  <h1>HTML task</h1>
  <p>This page uses only HTML and shows img, audio, video, iframe, embed, object, svg, and canvas.</p>

  <hr>

  <h2>Image</h2>
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80" alt="Landscape with mountains and a lake" width="600">

  <hr>

  <h2>Audio</h2>
  <audio controls>
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
    
  </audio>

  <hr>

  <h2>Video</h2>
  <video controls width="600" poster="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=1200&q=80">
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <hr>

  <h2>Iframe</h2>
  <iframe
  id="inlineFrameExample"
  title="Inline Frame Example"
  width="500"
  height="400"
  src="https://www.openstreetmap.org/export/embed.html?bbox=-0.004017949104309083%2C51.47612752641776%2C0.00030577182769775396%2C51.478569861898606&amp;layer=mapnik">
</iframe>

  <hr>

  <h2>Embed</h2>

  <iframe width="560" height="315" src="https://www.youtube.com/embed/r1NBQMsZtmo?si=_vHzzIU7M7YXrZr4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<hr>

<h2>Object</h2>
<object data="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" type="application/pdf" width="600" height="400">
  <p>Your browser does not support PDFs. <a href="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf">Download the PDF</a>.</p>
</object>

<h2>SVG</h2>
<svg width="600" height="220" viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="220" fill="#fff7ed"></rect>
  <circle cx="120" cy="90" r="50" fill="#f97316"></circle>
  <path d="M70 170 C 170 120, 250 120, 350 170 S 520 220, 580 150" fill="none" stroke="#fb923c" stroke-width="10" stroke-linecap="round"></path>
  <text x="300" y="115" text-anchor="middle" font-family="Arial" font-size="28" fill="#1f2937">Inline SVG</text>
</svg>

<h2>Canvas</h2> 
<canvas id="myCanvas" width="600" height="400" style="border:1px solid #000000;"></canvas>
<script>
  const canvas = document.getElementById('myCanvas');
  const ctx = canvas.getContext('2d');

  // Draw a blue rectangle
  ctx.fillStyle = '#3b82f6';
  ctx.fillRect(50, 50, 200, 100);

  // Draw a red circle
  ctx.beginPath();
  ctx.arc(400, 150, 50, 0, Math.PI * 2);
  ctx.fillStyle = '#ef4444';
  ctx.fill();

  // Draw a green line
  ctx.beginPath();
  ctx.moveTo(50, 300);
  ctx.lineTo(550, 300);
  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 5;
  ctx.stroke();
</script>
</body>
</html>
